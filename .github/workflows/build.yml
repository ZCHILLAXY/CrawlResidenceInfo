name: Multi-Platform Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: myapp-windows.exe
          - os: ubuntu-latest
            output_name: myapp-linux
          - os: macos-latest
            output_name: myapp-macos

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
      shell: bash

    - name: Build with PyInstaller
      run: |
        # 方法A：直接指定输出文件名
        pyinstaller --onefile --name ${{ matrix.output_name }} gui.py
        
        # 方法B：或者用原来的方式，但要正确重命名
        # pyinstaller --onefile gui.py
        # if [ "${{ runner.os }}" = "Windows" ]; then
        #   mv dist/gui.exe dist/${{ matrix.output_name }}
        # else
        #   mv dist/gui dist/${{ matrix.output_name }}
        # fi
        
        # 验证文件是否生成
        echo "Contents of dist directory:"
        ls -la dist/
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: dist/${{ matrix.output_name }}